# fly.toml app configuration file generated for swing-trade on 2026-03-18T02:58:25+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'swing-trade'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  # 2026-07-18: 'stop' → 'suspend'. Python import zinciri (pandas+numpy+yfinance,
  # lokalde 4.3s, fly shared-cpu'da ~9s) yüzünden stop'tan uyanan makine portu
  # geç bağlıyor ve fly proxy ~8s'de pes ediyordu (PM05 "failed to connect" →
  # kullanıcıya "Fly proxy waited too much..."). Suspend RAM anlık görüntüsünden
  # ~1s'de döner; import maliyeti yalnız deploy sonrası ilk boot'ta kalır
  # (health check grace_period=30s bunu karşılar). Maliyet stop ile aynı.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # 2026-07-22: soft_limit 1 → 200. Tek makineli deployment'ta soft_limit=1,
  # tarama sırasındaki poll+health trafiğini "aşırı yük" sayıp fly'ı olmayan
  # 2. makineyi başlatmaya / trafiği dengelemeye zorluyordu ([PR04] "could not
  # find a good candidate", [PC07] connect fail). Ölçekleme yok (min=max=1),
  # bu yüzden concurrency limiti yalnız "makine kapanabilir mi" kararını
  # etkiler — yüksek tutmak tek makinenin tüm istekleri almasını sağlar.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  # Scan 10dk sürebilir — bağlantı timeout önlemi
  [http_service.http_options]
    idle_timeout = 660

  # 2026-07-22: timeout 10s→15s, grace 30s→120s. Tek CPU'da tarama thread'i
  # (pandas/numpy + yfinance) çalışırken health check event loop'u aç kalıp
  # timeout'a takılıyor, fly makineyi "unhealthy" sayıp trafiği kesiyor →
  # frontend poll'u kesiliyor. Uzun grace, tarama süresince (90-120s) tek bir
  # yavaş health yanıtının makineyi öldürmesini engeller.
  [[http_service.checks]]
    interval = '30s'
    timeout = '15s'
    grace_period = '120s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
