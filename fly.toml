# fly.toml app configuration file generated for swing-trade on 2026-03-18T02:58:25+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'swing-trade'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # soft_limit=1: 1+ istek = makine "meşgul", scan sırasında excess capacity ile durdurulmaz
  # min_machines_running=0: Boşta makine durur → maliyet yok. İstek gelince auto_start ile açılır.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 1
    hard_limit = 10

  # Scan 10dk sürebilir — bağlantı timeout önlemi
  [http_service.http_options]
    idle_timeout = 660

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
